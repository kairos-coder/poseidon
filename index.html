<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 Poseidon · Image Decompressor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/colorthief@2/dist/color-thief.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --void: #080a0f; --deep: #0b0e16; --surface: #1e2535;
            --poseidon: #3a7090; --tide: #5a9ab0; --abyss: #1a4050; --foam: #a0d0e0;
            --mist: #6a7a8a; --pale: #d4e0ed; --gold: #c8943a;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--void); font-family: var(--font-body); color: var(--pale); 
            min-height: 100vh; font-size: 18px;
            background-image: 
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(58,112,144,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 80% 100%, rgba(90,154,176,0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 1.2rem; }

        .telos-bar {
            background: rgba(58,112,144,0.06); border: 1px solid rgba(58,112,144,0.3);
            border-left: 3px solid var(--tide); border-radius: 6px;
            padding: 0.7rem 1rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .telos-bar .telos-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 3px; color: var(--tide); text-transform: uppercase; }
        .telos-bar .telos-text { font-family: var(--font-body); font-size: 0.9rem; color: var(--foam); font-style: italic; flex: 1; }
        .telos-bar .telos-text.empty { color: var(--mist); }

        .header { text-align: center; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(58,112,144,0.2); }
        .header h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--tide); letter-spacing: 4px; }
        .header-sub { font-family: var(--font-mono); font-size: 0.6rem; color: var(--mist); letter-spacing: 2px; margin-top: 0.2rem; }
        .wave-icon { font-size: 2rem; display: inline-block; animation: wave 3s ease-in-out infinite; }
        @keyframes wave { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        .stats { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1rem; font-family: var(--font-mono); font-size: 0.7rem; color: var(--mist); flex-wrap: wrap; }
        .stats span { color: var(--foam); font-weight: 500; }

        .btn-row { display: flex; gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
        button {
            font-family: var(--font-mono); font-size: 0.7rem; padding: 0.7rem 1.2rem; border-radius: 6px;
            cursor: pointer; border: 1px solid rgba(58,112,144,0.3); background: var(--deep);
            color: var(--foam); transition: all 0.25s; letter-spacing: 1px;
            flex: 1; min-width: 120px; min-height: 48px;
        }
        button:hover:not(:disabled) { background: var(--poseidon); color: #fff; border-color: var(--tide); }
        button.primary { background: var(--poseidon); color: #fff; border-color: var(--tide); font-weight: bold; }
        button.primary:hover:not(:disabled) { background: var(--tide); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .section-title { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 3px; color: var(--mist); margin-bottom: 0.8rem; }

        .image-list { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }
        .image-card { 
            background: var(--deep); border: 1px solid var(--surface); border-radius: 10px;
            overflow: hidden; transition: all 0.3s;
        }
        .image-card.processed { border-color: var(--poseidon); }
        .image-card img { width: 100%; display: block; }
        .image-info { padding: 0.8rem; }
        .image-info .prompt { font-family: var(--font-body); font-size: 0.75rem; font-style: italic; color: var(--pale); margin-bottom: 0.4rem; }
        .image-info .meta { font-family: var(--font-mono); font-size: 0.5rem; color: var(--mist); display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
        .domain-tag { padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.5rem; }
        .tag-love { background: rgba(176,88,112,0.2); color: #c07080; }
        .tag-war { background: rgba(192,56,42,0.2); color: #d05040; }
        .tag-wisdom { background: rgba(106,136,152,0.2); color: #8aa8b8; }
        .tag-light { background: rgba(212,168,80,0.2); color: #d4a850; }
        .tag-farm { background: rgba(90,128,64,0.2); color: #7ab060; }
        .tag-forge { background: rgba(192,112,64,0.2); color: #c07040; }
        .tag-crown { background: rgba(90,122,170,0.2); color: #8a9ac0; }
        .tag-tide { background: rgba(58,112,144,0.2); color: #5a9ab0; }
        .tag-wild { background: rgba(90,128,80,0.2); color: #6a9a60; }
        .tag-storm { background: rgba(154,138,192,0.2); color: #a090c0; }
        .tag-signal { background: rgba(212,184,74,0.2); color: #d4b84a; }
        .tag-vox { background: rgba(138,64,128,0.2); color: #b060a0; }

        .palette-row { display: flex; gap: 0.3rem; margin-top: 0.4rem; }
        .palette-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .extracted-text { 
            font-family: var(--font-mono); font-size: 0.5rem; color: var(--mist); 
            margin-top: 0.4rem; padding: 0.4rem; background: rgba(0,0,0,0.3); border-radius: 4px;
        }

        .process-btn {
            width: 100%; padding: 0.6rem; font-size: 0.7rem; font-weight: bold;
            background: linear-gradient(135deg, var(--poseidon), var(--abyss));
            color: var(--foam); border: 1px solid var(--tide); border-radius: 8px;
            cursor: pointer; font-family: var(--font-mono); letter-spacing: 2px;
            min-height: 44px; transition: all 0.3s; margin-top: 0.5rem;
        }
        .process-btn:hover:not(:disabled) { 
            background: linear-gradient(135deg, var(--tide), var(--poseidon));
            color: #fff;
        }
        .process-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .log { 
            background: var(--deep); border: 1px solid var(--surface); border-radius: 6px;
            padding: 0.6rem; max-height: 120px; overflow-y: auto;
            font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="wave-icon">🌊</div>
        <h1>POSEIDON</h1>
        <div class="header-sub">IMAGE DECOMPRESSOR · OCR · PALETTE · ROUTE</div>
    </div>

    <div class="telos-bar">
        <span class="telos-label">🎯 TELOS</span>
        <span class="telos-text empty" id="telosText">Loading...</span>
    </div>

    <div class="stats">
        <div>Images: <span id="imageCount">—</span></div>
        <div>Processed: <span id="processedCount">0</span></div>
    </div>

    <div class="btn-row">
        <button id="loadImagesBtn" class="primary">🌊 Load Images</button>
        <button id="processAllBtn">🔍 Process All</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>

    <div class="section-title">🖼️ IMAGES · FROM DEMETER</div>
    <div class="image-list" id="imageList">
        <div class="image-card"><div class="image-info"><div class="prompt">Load images from Demeter to begin.</div></div></div>
    </div>

    <div class="log" id="log"><div>🌊 Poseidon awaits the harvest.</div></div>

</div>

<script type="module">
const sb = window.supabase.createClient(
  'https://kzcucjcyxybypncbdbws.supabase.co',
  'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw'
);

let images = [];

// ═══════════════════════════════════════
// DOMAIN PALETTE MAPS
// ═══════════════════════════════════════
const DOMAIN_KEYWORDS = {
    love: ['love','heart','desire','beauty','grace','embrace','bloom','devotion','soul','charm','rose','warm','soft','passion'],
    war: ['battle','strike','blade','shield','rage','force','enemy','weapon','armor','clash','fire','smoke','iron'],
    wisdom: ['wisdom','knowledge','logic','reason','pattern','design','truth','mind','insight','strategy','geometric','blue','owl'],
    storm: ['thunder','lightning','decree','order','power','authority','judgment','dominion','sky','command','dark','cloud'],
    tide: ['ocean','wave','tide','flow','depth','current','surge','abyss','water','blue','deep','sea'],
    wild: ['hunt','wild','moon','beast','forest','fang','claw','track','instinct','predator','green','moonlit'],
    forge: ['forge','hammer','fire','craft','tool','metal','build','shape','anvil','steel','molten','sparks','orange'],
    farm: ['seed','harvest','soil','growth','field','earth','cultivate','root','bloom','cycle','golden','green'],
    crown: ['crown','throne','oath','legacy','memory','law','honor','blood','reign','covenant','stone','purple'],
    light: ['light','harmony','truth','vision','song','oracle','golden','radiant','clarity','beacon','gold','glow'],
    signal: ['signal','message','swift','path','word','code','cross','courier','speed','threshold','digital','neon'],
    vox: ['voice','utterance','echo','chant','breath','silence','scream','whisper','song','resonance','violet','echo']
};

function log(msg) { const el = document.getElementById('log'); el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML; }

// ═══════════════════════════════════════
// TELOS
// ═══════════════════════════════════════
async function loadTelos() {
  const { data } = await sb.from('telos').select('statement').eq('is_active', true).maybeSingle();
  const el = document.getElementById('telosText');
  el.textContent = data?.statement || 'No active telos — set one in Hera';
  el.classList.toggle('empty', !data?.statement);
}

// ═══════════════════════════════════════
// LOAD IMAGES
// ═══════════════════════════════════════
async function loadImages() {
    log('🌊 Loading images from Demeter...');
    const btn = document.getElementById('loadImagesBtn');
    btn.disabled = true; btn.textContent = 'Loading...';

    const { data, error } = await sb.from('images')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(12);

    if (error) { log(`❌ ${error.message}`); btn.disabled = false; btn.textContent = '🌊 Load Images'; return; }

    images = data || [];
    document.getElementById('imageCount').textContent = images.length;
    document.getElementById('processedCount').textContent = images.filter(i => i.status === 'processed').length;
    renderImages();
    log(`✅ ${images.length} images loaded.`);
    btn.disabled = false; btn.textContent = '🌊 Load Images';
}

function renderImages() {
    const list = document.getElementById('imageList');
    if (!images.length) {
        list.innerHTML = '<div class="image-card"><div class="image-info"><div class="prompt">No images. Load from Demeter.</div></div></div>';
        return;
    }
    list.innerHTML = images.map((img, i) => `
        <div class="image-card ${img.status === 'processed' ? 'processed' : ''}" id="image-${i}">
            <img src="${img.image_url}" alt="Generated" loading="lazy" />
            <div class="image-info">
                <div class="prompt">${esc(img.prompt_text || '').substring(0, 100)}...</div>
                <div class="meta">
                    ${(img.domain_tags || []).map(t => `<span class="domain-tag tag-${t}">${t}</span>`).join('')}
                    <span>${esc(img.status || 'raw')}</span>
                </div>
                ${img.palette ? `<div class="palette-row">${(img.palette || []).map(c => `<div class="palette-swatch" style="background:${c}" title="${c}"></div>`).join('')}</div>` : ''}
                ${img.extracted_text ? `<div class="extracted-text">OCR: ${esc(img.extracted_text).substring(0, 120)}</div>` : ''}
                <button class="process-btn" onclick="processImage(${i})" ${img.status === 'processed' ? 'disabled' : ''}>
                    🔍 ${img.status === 'processed' ? 'Processed' : 'Decompress & Classify'}
                </button>
            </div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════
// PROCESS SINGLE IMAGE
// ═══════════════════════════════════════
async function processImage(index) {
    const img = images[index];
    if (!img) return;

    const card = document.getElementById(`image-${index}`);
    const btn = card?.querySelector('.process-btn');
    if (btn) { btn.disabled = true; btn.textContent = '🔍 Decompressing...'; }

    log(`🔍 Processing: ${img.prompt_text?.substring(0, 40)}...`);

    try {
        // 1. Tesseract OCR — extract text from image
        let extractedText = '';
        try {
            const { data: { text } } = await Tesseract.recognize(img.image_url, 'eng', {
                logger: m => { if (m.status === 'recognizing text') log(`   OCR: ${Math.round(m.progress * 100)}%`); }
            });
            extractedText = text.trim();
        } catch (e) {
            log('   ⚠️ OCR failed — continuing with palette only.');
        }

        // 2. Color Thief — extract palette from the image
        let palette = [];
        try {
            const tempImg = new Image();
            tempImg.crossOrigin = 'anonymous';
            await new Promise((resolve, reject) => {
                tempImg.onload = resolve;
                tempImg.onerror = reject;
                tempImg.src = img.image_url;
            });
            
            const thief = new ColorThief();
            palette = thief.getPalette(tempImg, 5).map(c => `#${c.map(x => x.toString(16).padStart(2, '0')).join('')}`);
        } catch (e) {
            log('   ⚠️ Palette extraction failed.');
        }

        // 3. Classify domain from prompt + extracted text
        const allText = `${img.prompt_text || ''} ${extractedText}`.toLowerCase();
        const domainScores = {};
        for (const [domain, keywords] of Object.entries(DOMAIN_KEYWORDS)) {
            domainScores[domain] = keywords.reduce((score, kw) => {
                return score + (allText.includes(kw) ? 1 : 0);
            }, 0);
        }
        const topDomains = Object.entries(domainScores)
            .filter(([, score]) => score > 0)
            .sort(([, a], [, b]) => b - a)
            .slice(0, 3)
            .map(([domain]) => domain);

        if (!topDomains.length) topDomains.push('signal'); // default

        // 4. Store tokens from extracted text into Hermes queue
        if (extractedText) {
            const words = [...new Set(extractedText.toLowerCase().match(/\b\w{3,16}\b/g) || [])];
            const tokens = words.slice(0, 20).map(w => ({
                body: w,
                domain: topDomains[0],
                word_type: 'S',
                score: 40,
                source: 'poseidon-ocr',
                created_at: new Date().toISOString()
            }));
            if (tokens.length) {
                await sb.from('tokens').upsert(tokens, { onConflict: 'body' });
                log(`   📝 ${tokens.length} tokens extracted and routed to Hermes.`);
            }
        }

        // 5. Update image record
        await sb.from('images').update({
            domain_tags: topDomains,
            palette: palette,
            extracted_text: extractedText,
            status: 'processed',
            crowned: true
        }).eq('id', img.id);

        log(`✅ Image classified: ${topDomains.join(', ')}. Routed to pantheon.`);
        await loadImages();

    } catch (e) {
        log(`❌ Processing failed: ${e.message}`);
        if (btn) { btn.disabled = false; btn.textContent = '🔍 Decompress & Classify'; }
    }
}
window.processImage = processImage;

// ═══════════════════════════════════════
// PROCESS ALL
// ═══════════════════════════════════════
async function processAll() {
    const raw = images.filter(i => i.status !== 'processed');
    if (!raw.length) { log('No unprocessed images.'); return; }
    log(`🌊 Processing ${raw.length} images...`);
    for (let i = 0; i < raw.length; i++) {
        const idx = images.indexOf(raw[i]);
        await processImage(idx);
    }
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadTelos();
loadImages();

document.getElementById('loadImagesBtn').onclick = loadImages;
document.getElementById('processAllBtn').onclick = processAll;
document.getElementById('refreshBtn').onclick = () => loadImages();

log('🌊 Poseidon ready. Images → OCR → Palette → Domain → Route.');
</script>
</body>
</html>

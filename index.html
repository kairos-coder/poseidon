<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 Poseidon · Image Decompressor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/colorthief@2/dist/color-thief.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --void: #080a0f; --deep: #0b0e16; --surface: #1e2535;
            --poseidon: #3a7090; --tide: #5a9ab0; --abyss: #1a4050; --foam: #a0d0e0;
            --mist: #6a7a8a; --pale: #d4e0ed; --gold: #c8943a;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--void); font-family: var(--font-body); color: var(--pale); 
            min-height: 100vh; font-size: 18px;
            background-image: 
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(58,112,144,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 80% 100%, rgba(90,154,176,0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 1.2rem; }

        .telos-bar {
            background: rgba(58,112,144,0.06); border: 1px solid rgba(58,112,144,0.3);
            border-left: 3px solid var(--tide); border-radius: 6px;
            padding: 0.7rem 1rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .telos-bar .telos-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 3px; color: var(--tide); text-transform: uppercase; }
        .telos-bar .telos-text { font-family: var(--font-body); font-size: 0.9rem; color: var(--foam); font-style: italic; flex: 1; }
        .telos-bar .telos-text.empty { color: var(--mist); }

        .header { text-align: center; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(58,112,144,0.2); }
        .header h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--tide); letter-spacing: 4px; }
        .header-sub { font-family: var(--font-mono); font-size: 0.6rem; color: var(--mist); letter-spacing: 2px; margin-top: 0.2rem; }
        .wave-icon { font-size: 2rem; display: inline-block; animation: wave 3s ease-in-out infinite; }
        @keyframes wave { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        .stats { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1rem; font-family: var(--font-mono); font-size: 0.7rem; color: var(--mist); flex-wrap: wrap; }
        .stats span { color: var(--foam); font-weight: 500; }

        .btn-row { display: flex; gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
        button {
            font-family: var(--font-mono); font-size: 0.7rem; padding: 0.7rem 1.2rem; border-radius: 6px;
            cursor: pointer; border: 1px solid rgba(58,112,144,0.3); background: var(--deep);
            color: var(--foam); transition: all 0.25s; letter-spacing: 1px;
            flex: 1; min-width: 120px; min-height: 48px;
        }
        button:hover:not(:disabled) { background: var(--poseidon); color: #fff; border-color: var(--tide); }
        button.primary { background: var(--poseidon); color: #fff; border-color: var(--tide); font-weight: bold; }
        button.primary:hover:not(:disabled) { background: var(--tide); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .section-title { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 3px; color: var(--mist); margin-bottom: 0.8rem; }

        .image-queue { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }
        .queue-card { 
            background: var(--deep); border: 1px solid var(--surface); border-radius: 10px;
            overflow: hidden; transition: all 0.3s;
        }
        .queue-card img { width: 100%; display: block; }
        .queue-info { padding: 0.8rem; }
        .queue-prompt { font-family: var(--font-body); font-size: 0.75rem; font-style: italic; color: var(--pale); margin-bottom: 0.4rem; }

        .decompress-btn {
            width: 100%; padding: 0.7rem; font-size: 0.7rem; font-weight: bold;
            background: linear-gradient(135deg, var(--poseidon), var(--abyss));
            color: var(--foam); border: 1px solid var(--tide); border-radius: 8px;
            cursor: pointer; font-family: var(--font-mono); letter-spacing: 2px;
            min-height: 44px; transition: all 0.3s;
        }
        .decompress-btn:hover:not(:disabled) { 
            background: linear-gradient(135deg, var(--tide), var(--poseidon));
            color: #fff;
        }
        .decompress-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── TOKEN HISTORY ── */
        .token-list { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1.5rem; }
        .token-row {
            background: var(--deep); border: 1px solid var(--surface); border-radius: 6px;
            padding: 0.5rem 0.8rem; display: flex; align-items: center; gap: 0.6rem;
            font-family: var(--font-mono); font-size: 0.6rem;
        }
        .token-row .word { color: var(--foam); min-width: 90px; }
        .token-row .domain { 
            padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.5rem;
            background: rgba(58,112,144,0.2); color: var(--tide);
        }
        .token-row .source { color: var(--mist); font-size: 0.45rem; margin-left: auto; }

        .log { 
            background: var(--deep); border: 1px solid var(--surface); border-radius: 6px;
            padding: 0.6rem; max-height: 120px; overflow-y: auto;
            font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="wave-icon">🌊</div>
        <h1>POSEIDON</h1>
        <div class="header-sub">IMAGE DECOMPRESSOR · OCR · PALETTE · TOKENIZE</div>
    </div>

    <div class="telos-bar">
        <span class="telos-label">🎯 TELOS</span>
        <span class="telos-text empty" id="telosText">Loading...</span>
    </div>

    <div class="stats">
        <div>Queue: <span id="queueCount">—</span></div>
        <div>Processed: <span id="processedCount">0</span></div>
        <div>Tokens: <span id="tokenCount">—</span></div>
    </div>

    <div class="btn-row">
        <button id="loadImagesBtn" class="primary">🌊 Load Queue</button>
        <button id="processAllBtn">🔍 Decompress All</button>
    </div>

    <div class="section-title">🖼️ IMAGE QUEUE · FROM DEMETER</div>
    <div class="image-queue" id="imageQueue">
        <div class="queue-card"><div class="queue-info"><div class="queue-prompt">Load images to begin decompression.</div></div></div>
    </div>

    <div class="section-title">📝 TOKEN HISTORY · SENT TO HERMES</div>
    <div class="token-list" id="tokenList">
        <div class="token-row"><span class="word">—</span><span class="source">No tokens extracted yet.</span></div>
    </div>

    <div class="log" id="log"><div>🌊 Poseidon awaits the harvest.</div></div>

</div>

<script type="module">
const sb = window.supabase.createClient(
  'https://kzcucjcyxybypncbdbws.supabase.co',
  'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw'
);

let queueImages = [];
let tokenHistory = [];

const DOMAIN_KEYWORDS = {
    love: ['love','heart','desire','beauty','grace','embrace','bloom','devotion','soul','charm','rose','warm','soft','passion'],
    war: ['battle','strike','blade','shield','rage','force','enemy','weapon','armor','clash','fire','smoke','iron'],
    wisdom: ['wisdom','knowledge','logic','reason','pattern','design','truth','mind','insight','strategy','geometric','blue'],
    storm: ['thunder','lightning','decree','order','power','authority','judgment','dominion','sky','command','dark','cloud'],
    tide: ['ocean','wave','tide','flow','depth','current','surge','abyss','water','blue','deep','sea'],
    wild: ['hunt','wild','moon','beast','forest','fang','claw','track','instinct','predator','green','moonlit'],
    forge: ['forge','hammer','fire','craft','tool','metal','build','shape','anvil','steel','molten','sparks'],
    farm: ['seed','harvest','soil','growth','field','earth','cultivate','root','bloom','cycle','golden','green'],
    crown: ['crown','throne','oath','legacy','memory','law','honor','blood','reign','covenant','stone'],
    light: ['light','harmony','truth','vision','song','oracle','golden','radiant','clarity','beacon','gold','glow'],
    signal: ['signal','message','swift','path','word','code','cross','courier','speed','threshold','digital','neon'],
    vox: ['voice','utterance','echo','chant','breath','silence','scream','whisper','song','resonance']
};

function log(msg) { const el = document.getElementById('log'); el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML; }

// ═══════════════════════════════════════
// TELOS
// ═══════════════════════════════════════
async function loadTelos() {
  const { data } = await sb.from('telos').select('statement').eq('is_active', true).maybeSingle();
  const el = document.getElementById('telosText');
  el.textContent = data?.statement || 'No active telos — set one in Hera';
  el.classList.toggle('empty', !data?.statement);
}

// ═══════════════════════════════════════
// LOAD QUEUE (only unprocessed images)
// ═══════════════════════════════════════
async function loadQueue() {
    log('🌊 Loading image queue...');
    const btn = document.getElementById('loadImagesBtn');
    btn.disabled = true; btn.textContent = 'Loading...';

    const { data, error } = await sb.from('images')
        .select('*')
        .eq('status', 'raw')
        .order('created_at', { ascending: false })
        .limit(12);

    if (error) { log(`❌ ${error.message}`); btn.disabled = false; btn.textContent = '🌊 Load Queue'; return; }

    queueImages = data || [];
    document.getElementById('queueCount').textContent = queueImages.length;
    
    // Also load processed count and recent tokens
    const [{ count: processedCount }, { data: recentTokens }] = await Promise.all([
        sb.from('images').select('*', { count: 'exact', head: true }).eq('status', 'processed'),
        sb.from('tokens').select('*').eq('source', 'poseidon-ocr').order('created_at', { ascending: false }).limit(20)
    ]);
    
    document.getElementById('processedCount').textContent = processedCount || 0;
    tokenHistory = recentTokens || [];
    document.getElementById('tokenCount').textContent = tokenHistory.length;
    
    renderQueue();
    renderTokenHistory();
    log(`✅ ${queueImages.length} images in queue. ${processedCount || 0} processed.`);
    btn.disabled = false; btn.textContent = '🌊 Load Queue';
}

function renderQueue() {
    const list = document.getElementById('imageQueue');
    if (!queueImages.length) {
        list.innerHTML = '<div class="queue-card"><div class="queue-info"><div class="queue-prompt">Queue empty. All images processed. 🌊</div></div></div>';
        return;
    }
    list.innerHTML = queueImages.map((img, i) => `
        <div class="queue-card" id="queue-${i}">
            <img src="${img.image_url}" alt="Queued" loading="lazy" />
            <div class="queue-info">
                <div class="queue-prompt">${esc(img.prompt_text || '').substring(0, 100)}...</div>
                <button class="decompress-btn" onclick="decompress(${i})">🔍 Decompress & Classify</button>
            </div>
        </div>
    `).join('');
}

function renderTokenHistory() {
    const list = document.getElementById('tokenList');
    if (!tokenHistory.length) {
        list.innerHTML = '<div class="token-row"><span class="word">—</span><span class="source">No tokens extracted yet. Decompress an image to start.</span></div>';
        return;
    }
    list.innerHTML = tokenHistory.map(t => `
        <div class="token-row">
            <span class="word">${esc(t.body)}</span>
            <span class="domain">${esc(t.domain || '?')}</span>
            <span class="source">poseidon-ocr · ${new Date(t.created_at).toLocaleTimeString()}</span>
        </div>
    `).join('');
}

// ═══════════════════════════════════════
// DECOMPRESS SINGLE IMAGE
// ═══════════════════════════════════════
async function decompress(index) {
    const img = queueImages[index];
    if (!img) return;

    const card = document.getElementById(`queue-${index}`);
    const btn = card?.querySelector('.decompress-btn');
    if (btn) { btn.disabled = true; btn.textContent = '🔍 Decompressing...'; }

    log(`🔍 Decompressing: ${img.prompt_text?.substring(0, 50)}...`);

    try {
        // 1. Tesseract OCR
        let extractedText = '';
        try {
            const { data: { text } } = await Tesseract.recognize(img.image_url, 'eng');
            extractedText = text.trim();
        } catch (e) {
            log('   ⚠️ No text found in image.');
        }

        // 2. Color Thief palette
        let palette = [];
        try {
            const tempImg = new Image();
            tempImg.crossOrigin = 'anonymous';
            await new Promise((resolve, reject) => {
                tempImg.onload = resolve;
                tempImg.onerror = reject;
                tempImg.src = img.image_url;
            });
            const thief = new ColorThief();
            palette = thief.getPalette(tempImg, 5).map(c => `#${c.map(x => x.toString(16).padStart(2, '0')).join('')}`);
        } catch (e) {
            log('   ⚠️ Palette extraction skipped.');
        }

        // 3. Classify domain
        const allText = `${img.prompt_text || ''} ${extractedText}`.toLowerCase();
        const domainScores = {};
        for (const [domain, keywords] of Object.entries(DOMAIN_KEYWORDS)) {
            domainScores[domain] = keywords.reduce((score, kw) => score + (allText.includes(kw) ? 1 : 0), 0);
        }
        const topDomains = Object.entries(domainScores)
            .filter(([, s]) => s > 0)
            .sort(([, a], [, b]) => b - a)
            .slice(0, 3)
            .map(([d]) => d);
        if (!topDomains.length) topDomains.push('signal');

        // 4. Extract tokens → Hermes
        if (extractedText) {
            const words = [...new Set(extractedText.toLowerCase().match(/\b\w{3,16}\b/g) || [])];
            const tokens = words.slice(0, 20).map(w => ({
                body: w,
                domain: topDomains[0],
                word_type: 'S',
                score: 40,
                source: 'poseidon-ocr',
                created_at: new Date().toISOString()
            }));
            if (tokens.length) {
                await sb.from('tokens').upsert(tokens, { onConflict: 'body' });
                log(`   📝 ${tokens.length} tokens sent to Hermes (tokens table).`);
            }
        }

        // 5. Update image — marks it as processed, removes from queue
        await sb.from('images').update({
            domain_tags: topDomains,
            palette: palette,
            extracted_text: extractedText || '',
            status: 'processed'
        }).eq('id', img.id);

        // 6. Remove from local queue
        queueImages.splice(index, 1);
        document.getElementById('queueCount').textContent = queueImages.length;
        renderQueue();
        
        // Refresh token history
        const { data: recentTokens } = await sb.from('tokens')
            .select('*').eq('source', 'poseidon-ocr')
            .order('created_at', { ascending: false }).limit(20);
        tokenHistory = recentTokens || [];
        document.getElementById('tokenCount').textContent = tokenHistory.length;
        renderTokenHistory();

        const { count: processedCount } = await sb.from('images')
            .select('*', { count: 'exact', head: true }).eq('status', 'processed');
        document.getElementById('processedCount').textContent = processedCount || 0;

        log(`✅ Classified as ${topDomains.join(', ')}. Image tagged. Tokens sent to Hermes.`);

    } catch (e) {
        log(`❌ Decompress failed: ${e.message}`);
        if (btn) { btn.disabled = false; btn.textContent = '🔍 Decompress & Classify'; }
    }
}
window.decompress = decompress;

// ═══════════════════════════════════════
// DECOMPRESS ALL
// ═══════════════════════════════════════
async function decompressAll() {
    if (!queueImages.length) { log('Queue empty.'); return; }
    log(`🌊 Decompressing ${queueImages.length} images...`);
    while (queueImages.length > 0) {
        await decompress(0);
    }
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadTelos();
loadQueue();

document.getElementById('loadImagesBtn').onclick = loadQueue;
document.getElementById('processAllBtn').onclick = decompressAll;

log('🌊 Poseidon ready. Queue → Decompress → Tokenize → Route.');
</script>
</body>
</html>
